services:
  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_FLIGHT_API_URL: http://localhost:4001
        NEXT_PUBLIC_BOOKING_API_URL: http://localhost:4002
        NEXT_PUBLIC_CHECKIN_API_URL: http://localhost:4003
        NEXT_PUBLIC_NOTIFICATION_API_URL: http://localhost:4004
    ports:
      - "3000:3000"
    depends_on:
      - flight-service
      - booking-service
      - checkin-service
      - notification-service

  postgres:
    build:
      context: ./infra/db
    container_name: unitedops-postgres
    environment:
      POSTGRES_USER: unitedops
      POSTGRES_PASSWORD: unitedops_dev_password
      POSTGRES_DB: unitedops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unitedops -d unitedops"]
      interval: 10s
      timeout: 5s
      retries: 5

  flight-service:
    build:
      context: ./apps/flight-service
    environment:
      SERVICE_NAME: flight-service
      PORT: 4001
      DATABASE_URL: postgres://unitedops:unitedops_dev_password@postgres:5432/unitedops
    ports:
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy

  booking-service:
    build:
      context: ./apps/booking-service
    environment:
      SERVICE_NAME: booking-service
      PORT: 4002
      DATABASE_URL: postgres://unitedops:unitedops_dev_password@postgres:5432/unitedops
    ports:
      - "4002:4002"
    depends_on:
      postgres:
        condition: service_healthy

  checkin-service:
    build:
      context: ./apps/checkin-service
    environment:
      SERVICE_NAME: checkin-service
      PORT: 4003
      DATABASE_URL: postgres://unitedops:unitedops_dev_password@postgres:5432/unitedops
    ports:
      - "4003:4003"
    depends_on:
      postgres:
        condition: service_healthy

  notification-service:
    build:
      context: ./apps/notification-service
    environment:
      SERVICE_NAME: notification-service
      PORT: 4004
    ports:
      - "4004:4004"

volumes:
  postgres-data:
