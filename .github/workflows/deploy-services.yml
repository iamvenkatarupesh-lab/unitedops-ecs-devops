name: Deploy Services

on:
  push:
    branches:
      - main
    paths:
      - "apps/**"
      - ".github/workflows/deploy-services.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ROLE_ARN: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/unitedops-dev-github-actions
  ECS_CLUSTER: unitedops-dev-cluster

jobs:
  build-push-deploy:
    name: Build, Push, And Redeploy ECS Services
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - app: frontend
            ecr: unitedops-frontend
            ecs: unitedops-dev-frontend
          - app: flight-service
            ecr: unitedops-flight-service
            ecs: unitedops-dev-flight-service
          - app: booking-service
            ecr: unitedops-booking-service
            ecs: unitedops-dev-booking-service
          - app: checkin-service
            ecr: unitedops-checkin-service
            ecs: unitedops-dev-checkin-service
          - app: notification-service
            ecr: unitedops-notification-service
            ecs: unitedops-dev-notification-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: unitedops-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Docker image URI
        run: |
          echo "IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${{ matrix.service.ecr }}:latest" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            --platform linux/amd64 \
            -t "$IMAGE_URI" \
            ./apps/${{ matrix.service.app }}

      - name: Push Docker image to ECR
        run: docker push "$IMAGE_URI"

      - name: Force ECS service deployment
        if: matrix.service.ecs != ''
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "${{ matrix.service.ecs }}" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for ECS service stability
        if: matrix.service.ecs != ''
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "${{ matrix.service.ecs }}" \
            --region "$AWS_REGION"
